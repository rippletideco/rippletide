name: Release Coding Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from"
        required: true
        default: "main"
      version:
        description: "CLI semver version. Use an internal prerelease such as 0.5.47-internal.1"
        required: true

permissions:
  contents: read

env:
  WORKING_DIR: context-graph

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
      npm_dist_tag: ${{ steps.meta.outputs.npm_dist_tag }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            ref_name="${GITHUB_REF_NAME}"
            if [[ ! "${ref_name}" =~ ^v.+$ ]]; then
              echo "Unexpected release tag: ${ref_name}" >&2
              exit 1
            fi
            cli_version="${ref_name#v}"
            npm_dist_tag="latest"
            checkout_ref="${GITHUB_SHA}"
          else
            cli_version="${{ github.event.inputs.version }}"
            checkout_ref="${{ github.event.inputs.ref }}"
            npm_dist_tag="internal"
            if [[ ! "${cli_version}" =~ -internal([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Internal releases must use an internal prerelease version like 0.5.47-internal.1" >&2
              exit 1
            fi
          fi

          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "cli_version=${cli_version}" >> "${GITHUB_OUTPUT}"
          echo "npm_dist_tag=${npm_dist_tag}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: rippletide-code-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: rippletide-code-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: rippletide-code-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: rippletide-code-win32-x64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            npm-pkg: rippletide-code-win32-arm64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: rippletide-code-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set CLI package version
        run: python context-graph/scripts/set_coding_agent_version.py "${{ needs.prepare.outputs.cli_version }}"

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Copy binary to npm package (Unix)
        if: runner.os != 'Windows'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cp target/${{ matrix.target }}/release/rippletide-cli npm/${{ matrix.npm-pkg }}/rippletide-code

      - name: Copy binary to npm package (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          copy target\${{ matrix.target }}\release\rippletide-cli.exe npm\${{ matrix.npm-pkg }}\rippletide-code.exe
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: ${{ env.WORKING_DIR }}/npm/${{ matrix.npm-pkg }}/

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set CLI package version
        run: python context-graph/scripts/set_coding_agent_version.py "${{ needs.prepare.outputs.cli_version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy artifacts into npm packages
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          for pkg in rippletide-code-darwin-arm64 rippletide-code-darwin-x64 rippletide-code-linux-x64 rippletide-code-linux-arm64; do
            cp -r $GITHUB_WORKSPACE/artifacts/$pkg/* npm/$pkg/
            chmod +x npm/$pkg/rippletide-code
          done
          cp -r $GITHUB_WORKSPACE/artifacts/rippletide-code-win32-x64/* npm/rippletide-code-win32-x64/
          cp -r $GITHUB_WORKSPACE/artifacts/rippletide-code-win32-arm64/* npm/rippletide-code-win32-arm64/

      - name: Publish platform packages
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          for pkg in rippletide-code-darwin-arm64 rippletide-code-darwin-x64 rippletide-code-linux-x64 rippletide-code-linux-arm64 rippletide-code-win32-x64 rippletide-code-win32-arm64; do
            npm publish npm/$pkg/ --access public --tag "${NPM_DIST_TAG}"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.prepare.outputs.npm_dist_tag }}

      - name: Publish main package
        working-directory: ${{ env.WORKING_DIR }}
        run: npm publish npm/rippletide-code/ --access public --tag "${NPM_DIST_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.prepare.outputs.npm_dist_tag }}
